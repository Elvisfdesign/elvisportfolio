<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Frame + accent: matches editorial surface / Signal dot language -->
  <defs>
    <style>
      .paper {
        fill: #f5f2ea;
      }
      .frame {
        fill: none;
        stroke-width: 0.95;
        stroke: rgba(20, 19, 15, 0.22);
      }
      .dot {
        fill: #5d7d00;
      }
      @media (prefers-color-scheme: dark) {
        .paper {
          fill: #0b0b0c;
        }
        .frame {
          stroke: rgba(237, 234, 227, 0.22);
        }
        .dot {
          fill: #c8ff00;
        }
      }
    </style>
  </defs>
  <rect class="paper" width="32" height="32" rx="4" />
  <rect class="frame" x="7" y="7" width="18" height="18" rx="1.25" />
  <circle class="dot" cx="21.75" cy="21.75" r="3.25" />
</svg>
